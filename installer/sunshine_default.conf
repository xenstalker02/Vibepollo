# Vibepollo default configuration
# Generated by installer. Edit via the web UI at https://localhost:47990
# Full documentation: https://github.com/xenstalker02/Vibepollo

# Audio output sink for game/desktop audio
# Run tools\audio-info.exe to find device names
# audio_sink =

# Steam Streaming Microphone render endpoint
mic_sink = Speakers (Steam Streaming Microphone)

# Windows capture device switched to at session start so Discord (Default) picks up client mic
mic_capture_device = Microphone (Steam Streaming Microphone)

# Jitter buffer prebuffer depth in Opus packets (default 2, range 1-16)
mic_buffer_packets = 2

# Stream audio to client
stream_audio = enabled

# Sunshine will set the virtual audio sink as the default audio device during streaming
keep_sink_default = false

# Automatically capture the default audio sink
auto_capture_sink = enabled

# Min log level: verbose, debug, info, warning, error, fatal
min_log_level = info
