# Dependabot version updates — keeps the repo current with no manual attention.
# Security updates run separately (GitHub default, no config needed).
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # CI actions — patch drift on the workflow actions (low volume, safe to merge).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Web UI dependencies (Vue/vite bundle shipped in the installer).
  - package-ecosystem: "npm"
    directory: "/src_assets/common/assets/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
