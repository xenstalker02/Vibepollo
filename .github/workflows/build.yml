name: Build
permissions:
  contents: read

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '**.png'
      - '**.jpg'
      - 'docs/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '**.png'
      - '**.jpg'
      - 'docs/**'

jobs:
  build:
    name: Windows Build
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-cppwinrt

      # MinHook isn't an MSYS2 package; build + install it into the ucrt64 prefix so the
      # REQUIRED find_library(libMinHook.a) in cmake/dependencies/windows.cmake succeeds.
      # (Locally it's already installed in the prefix; CI had no step to provide it.)
      - name: Build and install MinHook
        run: |
          git clone --depth 1 https://github.com/TsudaKageyu/minhook.git "${RUNNER_TEMP}/minhook"
          cmake -S "${RUNNER_TEMP}/minhook" -B "${RUNNER_TEMP}/minhook/build" -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${MINGW_PREFIX}"
          cmake --build "${RUNNER_TEMP}/minhook/build" --target install

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: ninja -C build sunshine

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7
