name: Build
permissions:
  contents: read

# This fork is built and released locally (MSYS2 ucrt64). The inherited CI Build needs a
# dependency-parity pass — it must provision MinHook (not an MSYS2 package, only present in
# the local prefix) and a couple of build-only tools — before it runs clean. Until that's
# done it's manual-only (Actions tab -> Build -> Run workflow) so it doesn't post a red
# status on every push. Privacy-Scan and CodeQL still run automatically on push.
on:
  workflow_dispatch:

jobs:
  build:
    name: Windows Build
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-cppwinrt

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: ninja -C build sunshine

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7
