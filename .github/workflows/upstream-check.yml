name: Upstream Update Check
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Nonary/vibepollo upstream
        run: |
          git remote add nonary https://github.com/Nonary/vibepollo.git 2>/dev/null || true
          git fetch nonary main --no-tags 2>/dev/null || git fetch nonary master --no-tags
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse nonary/main 2>/dev/null || git rev-parse nonary/master)
          BEHIND=$(git rev-list --count HEAD..${UPSTREAM} 2>/dev/null || echo 0)
          echo "NONARY_BEHIND=$BEHIND" >> $GITHUB_ENV
          echo "NONARY_COMMIT=$UPSTREAM" >> $GITHUB_ENV
      - name: Check ClassicOldSong/Apollo upstream
        run: |
          git remote add classicoldsong https://github.com/ClassicOldSong/Apollo.git 2>/dev/null || true
          git fetch classicoldsong master --no-tags 2>/dev/null || true
          UPSTREAM=$(git rev-parse classicoldsong/master 2>/dev/null || echo "unknown")
          echo "CLASSIC_COMMIT=$UPSTREAM" >> $GITHUB_ENV
      - name: Fetch upstream commit log
        run: |
          LOG=$(git log HEAD..nonary/master --oneline --no-merges 2>/dev/null | head -20 || echo "(log unavailable)")
          echo "NONARY_LOG<<EOF" >> $GITHUB_ENV
          echo "$LOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Open issue if behind
        if: env.NONARY_BEHIND != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const behind = parseInt(process.env.NONARY_BEHIND);
            const commit = process.env.NONARY_COMMIT;
            const classic = process.env.CLASSIC_COMMIT;
            const commitLog = process.env.NONARY_LOG || '(log unavailable)';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-update',
              per_page: 5
            });
            if (issues.data.length > 0) {
              console.log('Open upstream-update issue already exists — skipping');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream update available: Nonary/vibepollo (${behind} commit${behind > 1 ? 's' : ''} behind)`,
              body: [
                '## Upstream Commits Available',
                '',
                `**Nonary/vibepollo** is ${behind} commit(s) ahead of our master.`,
                '',
                '### New commits (newest first)',
                '```',
                commitLog,
                '```',
                '',
                `**ClassicOldSong/Apollo** latest: \`${classic}\``,
                '',
                '## How to review',
                '```bash',
                'cd C:\\Vibepollo',
                'git fetch upstream',
                'git log HEAD..upstream/master --oneline',
                '```',
                '',
                '## Files needing careful review (contain our mic passthrough code)',
                '- `src/platform/windows/audio.cpp`',
                '- `src/stream.cpp`',
                '- `src/config.h` and `src/config.cpp`',
                '- `src_assets/common/assets/web/configs/tabs/AudioVideo.vue`',
                '- `src_assets/common/assets/web/public/assets/locale/en.json`',
                '',
                'All other files: take Nonary\'s version.',
                '',
                'Close this issue after merging or deciding to skip.'
              ].join('\n'),
              labels: ['upstream-update']
            });
