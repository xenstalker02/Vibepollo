name: Upstream Sync Check
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Add upstream
        run: git remote add upstream https://github.com/Nonary/vibepollo.git || true
      - name: Fetch upstream
        run: git fetch upstream master
      - name: Check for new commits
        id: check
        run: |
          NEW=$(git log HEAD..upstream/master --oneline)
          COUNT=$(git log HEAD..upstream/master --oneline | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          # Multi-line output needs delimiter
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "new_commits<<$EOF" >> $GITHUB_OUTPUT
          echo "$NEW" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          echo "New upstream commits: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            git log HEAD..upstream/master --oneline
          else
            echo "Fork is up to date with upstream"
          fi
      - name: Open issue if new commits
        if: steps.check.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync available -- ${${{ steps.check.outputs.count }}} new commits from Nonary/vibepollo`,
              body: `New commits available from upstream:\n\n\`\`\`\n${{ steps.check.outputs.new_commits }}\n\`\`\`\n\nSee UPSTREAM.md for merge instructions.`,
              labels: ['upstream-sync']
            });
