name: Privacy Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  privacy-scan:
    name: Scan diff for private data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > /tmp/scan.diff
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            git show HEAD > /tmp/scan.diff
          else
            git diff ${{ github.event.before }} ${{ github.sha }} > /tmp/scan.diff
          fi

      - name: Scan for private patterns
        env:
          # Pattern (MAC prefix / private IP ranges / device hostnames) is kept in a
          # repo secret so it isn't published in this workflow or the CI logs.
          PRIVACY_PATTERN: ${{ secrets.PRIVACY_PATTERN }}
        run: |
          if [ -z "$PRIVACY_PATTERN" ]; then
            echo "⚠️  PRIVACY_PATTERN secret not set — skipping scan."
            exit 0
          fi
          if grep -E "$PRIVACY_PATTERN" /tmp/scan.diff; then
            echo ""
            echo "❌ FAIL: sensitive pattern detected in diff"
            exit 1
          fi
          echo "✅ Privacy scan passed"
